<footer style="padding: 2rem 0; background-color: hsl(var(--foreground)); color: hsl(var(--background)); border-top: 1px solid hsl(var(--border) / 0.1);">
  <div class="container flex items-center justify-between" style="flex-wrap: wrap; gap: 1rem; max-width: 80rem;">
    <p class="text-sm" style="opacity: 0.6;">
      &copy; {{ now.Year }} {{ .Site.Params.firstName }} {{ .Site.Params.lastName }}. All rights reserved.
    </p>
    <a href="#top" class="text-sm transition-colors" style="opacity: 0.8;" data-scroll="top">
      Back to Top
    </a>
  </div>
</footer>

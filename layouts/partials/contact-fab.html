<!-- Floating Contact Button (simplified chatbot replacement) -->
<div id="contact-fab-popover" class="fab-popover">
  <p class="font-semibold text-sm mb-3 text-foreground">Get in touch</p>
  <div style="display: flex; flex-direction: column; gap: 0.5rem;">
    <a href="mailto:{{ .Site.Params.email }}?subject=Portfolio%20Inquiry" class="flex items-center gap-3 p-3 rounded-lg transition-colors" style="border: 1px solid hsl(var(--border)); background: hsl(var(--muted) / 0.3);">
      <svg class="icon-md text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <div>
        <p class="text-xs text-muted">Email</p>
        <p class="text-sm font-medium text-foreground">{{ .Site.Params.email }}</p>
      </div>
    </a>
    <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noreferrer" class="flex items-center gap-3 p-3 rounded-lg transition-colors" style="border: 1px solid hsl(var(--border)); background: hsl(var(--muted) / 0.3);">
      <svg class="icon-md text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
      <div>
        <p class="text-xs text-muted">LinkedIn</p>
        <p class="text-sm font-medium text-foreground">Connect</p>
      </div>
    </a>
  </div>
</div>

<button id="contact-fab" class="fab" aria-label="Contact" aria-expanded="false">
  <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>

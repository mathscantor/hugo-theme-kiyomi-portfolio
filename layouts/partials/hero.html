<section id="top" class="hero">
  <div class="hero-bg">
    <img src="{{ .Site.Params.heroBackground | relURL }}" alt="Background">
  </div>

  <div class="container" style="max-width: 80rem;">
    <div class="hero-content">
      <!-- Text -->
      <div class="fade-in flex-1" style="text-align: center;">
        <div class="location-tag mb-6">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          {{ .Site.Params.location }}
        </div>

        <h1 style="font-size: clamp(2.25rem, 5vw, 4.5rem); font-weight: 700; margin-bottom: 1.5rem;">
          Hi, I'm <span class="text-primary italic" style="font-size: clamp(2.5rem, 5.5vw, 4.375rem);">{{ .Site.Params.firstName }}</span>.
        </h1>

        <p class="text-muted" style="font-size: clamp(1.125rem, 2vw, 1.375rem); font-weight: 300; margin-bottom: 2rem; max-width: 42rem; margin-left: auto; margin-right: auto;">
          {{ .Site.Params.tagline }}
        </p>

        <div class="flex flex-col gap-4 items-center" style="flex-wrap: wrap;">
          <div class="flex gap-4 items-center" style="flex-wrap: wrap; justify-content: center;">
            <a href="#experience" class="btn btn-primary btn-lg" data-scroll="experience">
              View My Work
              <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <a href="#contact" class="btn btn-outline btn-lg" data-scroll="contact">
              Get in Touch
            </a>
          </div>
        </div>

        <div class="flex items-center justify-center gap-6 mt-10 text-muted">
          <a href="mailto:{{ .Site.Params.email }}?subject=Portfolio%20Inquiry" class="flex items-center gap-2 transition-colors hover:text-primary">
            <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <span class="text-sm font-medium">Email</span>
          </a>
          <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noreferrer" class="flex items-center gap-2 transition-colors hover:text-primary">
            <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
            <span class="text-sm font-medium">LinkedIn</span>
          </a>
        </div>
      </div>

      <!-- Photo -->
      <div class="fade-in-none hero-photo delay-2">
        <img src="{{ .Site.Params.profileImage | relURL }}" alt="{{ .Site.Params.firstName }} {{ .Site.Params.lastName }}">
      </div>
    </div>
  </div>
</section>

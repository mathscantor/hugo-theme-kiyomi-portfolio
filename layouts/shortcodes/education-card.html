<div class="card p-6 border-l-4" style="border-left: 4px solid hsl(var(--primary));">
  <div style="display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem;">
    <h3 class="font-bold text-lg">{{ .Get "degree" }}</h3>
    <span class="text-sm font-semibold text-primary" style="white-space: nowrap; background-color: hsl(var(--primary) / 0.05); padding: 0.25rem 0.5rem; border-radius: 0.25rem;">
      {{ .Get "year" }}
    </span>
  </div>
  <p class="text-muted">{{ .Get "school" }}</p>
</div>

<div class="project-mini">
  <p class="text-sm font-semibold text-foreground mb-1">{{ .Get "title" }}</p>
  <p class="text-xs text-muted leading-relaxed mb-2">{{ .Get "desc" }}</p>
  {{ $tags := .Get "tags" }}
  {{ if $tags }}
  <div class="flex flex-wrap gap-1">
    {{ range split $tags "," }}
    <span class="badge">{{ strings.TrimSpace . }}</span>
    {{ end }}
  </div>
  {{ end }}
</div>
